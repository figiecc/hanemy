      <p class="muted small">β版ではメールアプリを開く方式です。送信先はあとで差し替えできます。</p>
    </div>
  </section>
  <section class="card">
    <h2>保存について</h2>
    <p class="lead">データはこの端末のブラウザに保存されます。ブラウザのデータを消すと失われる場合があります。</p>
  </section>
  <section class="card"><button class="pill" id="backHome">ホームへ戻る</button></section>${appFooter()}`;
  document.getElementById('feedbackLink')?.setAttribute('href', feedbackHref());
  document.getElementById('settingStartDay').onclick=openStartDay;
  document.getElementById('edit').onclick=()=>{const p=active();if(!p)return;draft=norm(JSON.parse(JSON.stringify(p)));state.periods=state.periods.filter(x=>x.id!==p.id);state.active=state.periods.length?state.periods[state.periods.length-1].id:null;save();setupMode='wizard';step=0;setView('setup')};
  document.getElementById('resetPeriod').onclick=()=>{const p=active();if(p&&confirm('この操作は取り消せません。実行してもよろしいですか？')){state.periods=state.periods.filter(x=>x.id!==p.id);state.active=state.periods.length?state.periods[state.periods.length-1].id:null;save();draft=null;setupMode='landing';setView('home');}};
  document.getElementById('resetAll').onclick=()=>{if(confirm('この操作は取り消せません。実行してもよろしいですか？')){state=blank();save();draft=null;setupMode='landing';setView('home');}};
  document.getElementById('backHome').onclick=()=>setView('home');
}



function lightStatus(remaining){
  if(remaining < 0) return '調整しよう';
  if(remaining < 3000) return '少し控えめ';
  return 'まだ大丈夫';
}
function topTrendItems(p){
  return [
    ...life.map(([k,l])=>({label:l,amount:num(p.spent.life[k])})),
    ...fun.map(([k,l])=>({label:l,amount:num(p.spent.fun[k])})),
    ...(p.wantItems||[]).filter(x=>x.name).map(x=>({label:x.name,amount:num((p.spent.want||{})[x.name])}))
  ].filter(x=>x.amount>0).sort((a,b)=>b.amount-a.amount).slice(0,2);
}
function monthlyNote(p,t){
  if(t.adjusted<0)return '来月は、生活に使えるか楽しみに使えるを少し見直すと安心です。';
  if(t.fr<0)return '楽しみをしっかり使った月です。予定が多いなら、来月も楽しみに使えるを厚めにしてよさそうです。';
  if(t.lr<0)return '生活側が少し多めでした。来月は生活に使えるを少し厚くすると安定しそうです。';
  return '大きく崩れずに進められています。来月もこの作戦をもとに整えられそうです。';
}

function periodNearEnd(p){
  const d=daysLeftInPeriod(p);
  if(d<=3)return `今月の期間はあと${d}日です。今日は少し控えめだと安心です。`;
  if(d<=7)return `今月の期間はあと${d}日です。今の見通しを軽く確認しておきましょう。`;
  return '';
}
function balanceWarning(t){
  if(t.lr<0 && t.fr>0)return '生活側が少し足りません。楽しみに使える分とのバランスを見直せます。';
  if(t.fr<0 && t.lr>0)return '楽しみ側を少し多めに使っています。予定が続くなら今月の準備で整え直せます。';
  if(t.adjusted<0)return '少し調整が必要です。今月の準備から見直せます。';
  return '';
}
function renderUndoToast(){
  const host=document.getElementById('undoHost');
  if(!host)return;
  if(!lastUndo){host.hidden=true;host.innerHTML='';return;}
  host.hidden=false;
  host.innerHTML=`<span>${esc(lastUndo.label)} ${money(Number(lastUndo.amount)||0)} を入力しました</span><button class="link" id="undoLast">取り消す</button>`;
  document.getElementById('undoLast').onclick=()=>undoLastEntry();
}
function undoLastEntry(){
  if(!lastUndo)return;
  const p=active(); if(!p)return;
  reverseHistoryEntry(p,lastUndo);
  p.quickHistory=(p.quickHistory||[]).filter(x=>x.id!==lastUndo.id);
  save();
  lastUndo=null;
  render();
}
function reverseHistoryEntry(p,h){
  const reverse=-(Number(h.amount)||0);
  if(h.type==='life')p.spent.life[h.key]=Math.max(0,num(p.spent.life[h.key])+reverse);
  if(h.type==='fun')p.spent.fun[h.key]=Math.max(0,num(p.spent.fun[h.key])+reverse);
  if(h.type==='want')p.spent.want[h.key]=Math.max(0,num(p.spent.want[h.key])+reverse);
}

function openWantEditor(){
  const p=active(); if(!p)return;
  const rows=[0,1,2].map(i=>{
    const item=(p.wantItems||[])[i]||{};
    return `<div class="wantEditRow"><div class="field"><label>やりたいこと ${i+1}</label><input class="input wantNameEdit" data-i="${i}" value="${esc(item.name||'')}" placeholder="例：水族館"></div><div class="field"><label>目安</label><input class="input wantAmountEdit" data-i="${i}" inputmode="numeric" value="${num(item.amount)||''}" placeholder="0"></div><button class="tinyDanger removeWant" data-i="${i}">削除</button></div>`;
  }).join('');
  modal.hidden=false;
  modal.innerHTML=`<div class="noticeBubbleOverlay"><div class="noticeBubble" role="dialog" aria-modal="true"><div class="panelHead"><div><p class="eyebrow">今月やりたいこと</p><h2>追加・編集</h2></div><button class="closeX" id="closeWantEditor">×</button></div><p class="muted small">やりたいことは最大3つまで。個別に管理しすぎず、楽しみの具体として使います。</p><div class="wantEditor">${rows}</div><div class="actions"><button class="secondary" id="saveWantEditor">保存</button></div></div></div>`;
  document.getElementById('closeWantEditor').onclick=closeModal;
  document.querySelectorAll('.removeWant').forEach(btn=>btn.onclick=()=>{
    const i=Number(btn.dataset.i);
    p.wantItems[i]={name:'',amount:0,priority:i===0?'ぜったい':i===1?'できれば':'余裕があれば'};
    openWantEditor();
  });
  document.getElementById('saveWantEditor').onclick=()=>{
    p.wantItems=[0,1,2].map(i=>({
      name:document.querySelector(`.wantNameEdit[data-i="${i}"]`)?.value||'',
      amount:num(document.querySelector(`.wantAmountEdit[data-i="${i}"]`)?.value||0),
      priority:i===0?'ぜったい':i===1?'できれば':'余裕があれば'
    })).filter(x=>x.name||num(x.amount)>0);
    save();
    closeModal();
    renderHome();
  };
}

function renderQuickPage(){
  dataBtn.hidden=false;
  const p=active();
  if(!p){
    root.innerHTML=`${hero('ざっくり入力','まだ今月の準備がありません。','まずは今月の準備を始めましょう。')}<section class="card"><button class="primary" id="quickGoSetup">作戦を作る</button></section>${appFooter()}`;
    document.getElementById('quickGoSetup').onclick=()=>{setupMode='landing';setView('setup');};
    return;
  }

  const wants=(p.wantItems||[]).filter(x=>x.name||num(x.amount)>0);
  const groupLabel={life:'生活',fun:'楽しみ',want:'やりたいこと'}[quickGroup]||'生活';
  const groupItems = quickGroup==='life'
    ? life.map(([key,label])=>({type:'life',key,label}))
    : quickGroup==='fun'
      ? fun.map(([key,label])=>({type:'fun',key,label}))
      : wants.map(x=>({type:'want',key:x.name||'未入力',label:x.name||'未入力'}));

  root.innerHTML=`${hero('ざっくり入力','何に使いましたか？','金額を選んでから、最後に入力します。')}
  <section class="card">
    <h2>何に使いましたか？</h2>
    <div class="quickTabs" aria-label="入力先の種類">
      <button class="quickTab ${quickGroup==='life'?'active':''}" data-qgroup="life">生活</button>
      <button class="quickTab ${quickGroup==='fun'?'active':''}" data-qgroup="fun">楽しみ</button>
      <button class="quickTab ${quickGroup==='want'?'active':''}" data-qgroup="want">やりたいこと</button>
    </div>
    <div class="quickChips">
      ${groupItems.length?groupItems.map(x=>`<button class="quickChip ${quickSelected&&quickSelected.type===x.type&&quickSelected.key===x.key?'active':''}" data-qtype="${x.type}" data-qkey="${esc(x.key)}" data-qlabel="${esc(x.label)}">${esc(x.label)}</button>`).join(''):'<span class="muted small">やりたいことは、今月の準備で追加できます。</span>'}
    </div>
  </section>

  <section class="card" id="quickAmountCard" ${quickSelected?'':'hidden'}>
    <h2 id="quickSelectedTitle">${quickSelected?esc(quickSelected.label)+' に入力':'入力先を選んでください'}</h2>

    <div class="signToggle" aria-label="入力の種類">
      <button class="signBtn ${quickSign===1?'active':''}" data-sign="1">＋ 使った</button>
      <button class="signBtn ${quickSign===-1?'active':''}" data-sign="-1">− 取り消し</button>
    </div>

    <div class="pendingBox">
      <span class="label">入力予定額</span>
      <span class="pendingAmount ${quickSign===-1&&quickPending>0?'negative':''}">${quickSign===-1&&quickPending>0?'-':''}${money(quickPending)}</span>
      <p class="muted small">金額ボタンを押して予定額を作り、最後に「ざっくり入力する」を押します。</p>
    </div>

    <div class="amounts" style="margin-top:12px">
      ${[500,1000,3000].map(v=>`<button class="primary" data-add-pending="${v}">+${yen.format(v)}円</button>`).join('')}
    </div>

    <div class="actions">
      <button class="clearBtn" id="clearPending">クリア</button>
      <button class="primary" id="confirmQuick" ${quickPending>0?'':'disabled'}>ざっくり入力する</button>
    </div>
  </section>

  <section class="card">
    <h2>最近のざっくり入力</h2>
    <p class="muted small">間違えた入力だけ削除できます。履歴は確認用に少しだけ表示します。</p>
    ${renderQuickHistory(p)}
  </section>${appFooter()}`;

  document.querySelectorAll('[data-qgroup]').forEach(btn=>btn.onclick=()=>{
    quickGroup=btn.dataset.qgroup;
    quickSelected=null;
    quickPending=0;
    quickSign=1;
    renderQuickPage();
  });

  document.querySelectorAll('.quickChip').forEach(btn=>btn.onclick=()=>{
    quickSelected={type:btn.dataset.qtype,key:btn.dataset.qkey,label:btn.dataset.qlabel};
    quickPending=0;
    quickSign=1;
    renderQuickPage();
  });

  document.querySelectorAll('[data-sign]').forEach(btn=>btn.onclick=()=>{
    quickSign=Number(btn.dataset.sign);
    renderQuickPage();
  });

  document.querySelectorAll('[data-add-pending]').forEach(btn=>btn.onclick=()=>{
    quickPending += num(btn.dataset.addPending);
    renderQuickPage();
  });

  document.getElementById('clearPending')?.addEventListener('click',()=>{
    quickPending=0;
    renderQuickPage();
  });

  document.getElementById('confirmQuick')?.addEventListener('click',()=>{
    if(quickSelected && quickPending>0){
      applyQuickEntry(quickSelected, quickPending * quickSign);
      quickPending=0;
      quickSign=1;
      quickSelected=null;
    }
  });

  bindHistoryDelete();
}

function renderQuickHistory(p){
  const items=(p.quickHistory||[]).slice().reverse().slice(0,5);
  if(!items.length)return '<p class="muted" style="margin-top:12px">まだ入力はありません。</p>';
  return `<div class="historyList">${items.map(h=>`<div class="historyItem"><div><strong>${esc(h.label)}</strong><div class="muted small">${money(Number(h.amount)||0)}</div></div><button class="tinyDanger" data-delete-history="${esc(h.id)}">削除</button></div>`).join('')}</div>`;
}

function applyQuickEntry(target,amount){
  const p=active(); if(!p||!amount)return;
  const delta=Number(amount)||0;
  if(target.type==='life')p.spent.life[target.key]=Math.max(0,num(p.spent.life[target.key])+delta);
  if(target.type==='fun')p.spent.fun[target.key]=Math.max(0,num(p.spent.fun[target.key])+delta);
  if(target.type==='want')p.spent.want[target.key]=Math.max(0,num(p.spent.want[target.key])+delta);
  p.quickHistory=p.quickHistory||[];
  const entry={id:'h_'+Date.now()+'_'+Math.random().toString(16).slice(2),type:target.type,key:target.key,label:target.label,amount:delta,createdAt:new Date().toISOString()};
  p.quickHistory.push(entry);
  lastUndo=entry;
  save();
  renderQuickPage();
  renderUndoToast();
}

function bindHistoryDelete(){
  document.querySelectorAll('[data-delete-history]').forEach(btn=>btn.onclick=()=>{
    const p=active(); if(!p)return;
    const id=btn.dataset.deleteHistory;
    const h=(p.quickHistory||[]).find(x=>x.id===id);
    if(!h)return;
    reverseHistoryEntry(p,h);
    p.quickHistory=(p.quickHistory||[]).filter(x=>x.id!==id);
    if(lastUndo&&lastUndo.id===id)lastUndo=null;
    save();
    renderQuickPage();
    renderUndoToast();
  });
}

function render(){if(view==='setup')renderSetup();else if(view==='quick')renderQuickPage();else if(view==='review')renderReview();else renderHome();}
render();updateNoticeDot();
})();
</script>
