/* v0.18 UI foundation */
:root{
  --bg:#fff8ef;
  --cream:#fffaf3;
  --panel:#fffefb;
  --panel2:#fff4df;
  --ink:#37271c;
  --muted:#7b6859;
  --accent:#f28a1c;
  --accent2:#ffb35c;
  --orangeSoft:#fff0d8;
  --line:rgba(110,76,42,.12);
  --shadow:0 22px 52px rgba(90,56,25,.13);
  --shadow2:0 12px 26px rgba(90,56,25,.10);
}
html{background:
  radial-gradient(circle at 0% 0%,rgba(255,203,122,.44),transparent 38%),
  radial-gradient(circle at 105% 0%,rgba(255,215,190,.44),transparent 34%),
  linear-gradient(180deg,#fffaf2,#fff6e9 42%,#fff9f0);
}
.app{width:min(100%,520px);padding:12px 14px 104px}
.top{padding:8px 0 10px;background:linear-gradient(180deg,rgba(255,248,239,.92),rgba(255,248,239,.72));border-radius:0 0 22px 22px}
.logo{max-width:142px;max-height:46px}
.logoText{font-weight:950;color:var(--accent);letter-spacing:.08em;background:rgba(255,255,255,.58);box-shadow:var(--shadow2)}
.topActions{gap:9px}
.settingsBtn,.notifyBtn{width:44px;height:44px;background:rgba(255,255,255,.74);box-shadow:0 10px 25px rgba(90,56,25,.10);border-color:rgba(110,76,42,.12)}
.notifyDot{right:8px;top:7px}

.hero{display:none}
.card{border-radius:28px;background:rgba(255,255,255,.82);border:1px solid rgba(110,76,42,.10);box-shadow:var(--shadow2);padding:18px}
.card h2{font-size:1.24rem;letter-spacing:.02em}
.lead{line-height:1.7}
.primary{border-radius:24px;background:linear-gradient(135deg,#ff9a22,#f47f14);box-shadow:0 14px 28px rgba(242,138,28,.24);font-weight:950}
.secondary,.pill{border-radius:22px;background:rgba(255,251,245,.9);border-color:rgba(110,76,42,.14);font-weight:900}
.danger{border-radius:22px}
.input{border-radius:18px;border-color:rgba(110,76,42,.14);background:rgba(255,255,255,.88);min-height:48px}

.strategyBoard{padding:22px 18px;border-radius:34px;background:linear-gradient(145deg,#fff7e8 0%,#ffe3b6 100%);border:1px solid rgba(242,138,28,.24);box-shadow:0 24px 60px rgba(102,63,25,.18)}
.strategyBoard:after{right:-48px;top:-36px;width:162px;height:162px;background:rgba(255,255,255,.30)}
.homeHeroTop{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.homeBrandPill{display:inline-flex;align-items:center;gap:6px;min-height:30px;padding:0 12px;border-radius:999px;background:rgba(255,255,255,.58);color:var(--accent);font-weight:950;font-size:.82rem}
.homeMascotBubble{display:flex;gap:10px;align-items:center;padding:10px 12px;border-radius:24px;background:rgba(255,255,255,.62);box-shadow:0 10px 24px rgba(90,56,25,.08)}

function blank(){return{settings:{startDay:1,lastReadNoticeVersion:0},active:null,periods:[]};}
function id(){return'p_'+Date.now()+'_'+Math.random().toString(16).slice(2);}
function num(v){const x=Number(String(v??'').replace(/[^0-9.-]/g,''));return Number.isFinite(x)?Math.max(0,Math.floor(x)):0;}
function money(v){v=Number(v)||0;return(v<0?'-':'')+yen.format(Math.abs(Math.round(v)))+'円';}
function sum(o){return Object.values(o||{}).reduce((a,b)=>a+num(b),0);}
function ymd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function bounds(day,base=new Date()){day=Math.max(1,Math.min(28,Number(day)||1));let s=new Date(base.getFullYear(),base.getMonth(),day);if(base.getDate()<day)s=new Date(base.getFullYear(),base.getMonth()-1,day);let n=new Date(s.getFullYear(),s.getMonth()+1,day);let e=new Date(n.getFullYear(),n.getMonth(),n.getDate()-1);return{startDate:ymd(s),endDate:ymd(e)}}

function norm(p={}){const s=seed();return{...s,...p,income:{...s.income,...(p.income||{})},fixed:{selected:{...(p.fixed?.selected||{})},amounts:{...(p.fixed?.amounts||{})}},funPlan:{...s.funPlan,...(p.funPlan||{})},lifePlan:{...s.lifePlan,...(p.lifePlan||{})},spent:{life:{...s.spent.life,...(p.spent?.life||{})},fun:{...s.spent.fun,...(p.spent?.fun||{})},want:{...((p.spent&&p.spent.want)||{})}},quickHistory:Array.isArray(p.quickHistory)?p.quickHistory:[],enjoyTags:Array.isArray(p.enjoyTags)?p.enjoyTags:[],direction:p.direction||'fun',wantItems:Array.isArray(p.wantItems)?p.wantItems:[]};}
function load(){try{const stored=localStorage.getItem(KEY);if(!stored)return blank();return normalizeState(JSON.parse(stored)||blank());}catch{return blank();}}
function openHanemyDb(){
  return new Promise((resolve,reject)=>{
    if(!('indexedDB' in window)){reject(new Error('IndexedDB unavailable'));return;}
    const req=indexedDB.open(DB_NAME,1);
    req.onupgradeneeded=()=>{req.result.createObjectStore(DB_STORE,{keyPath:'id'});};
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error||new Error('IndexedDB open failed'));
  });
}
async function saveStateToIdb(value){
  const db=await openHanemyDb();
  await new Promise((resolve,reject)=>{
    const tx=db.transaction(DB_STORE,'readwrite');
    tx.objectStore(DB_STORE).put({id:DB_STATE_ID,value,updatedAt:new Date().toISOString()});
    tx.oncomplete=()=>resolve();
    tx.onerror=()=>reject(tx.error||new Error('IndexedDB save failed'));
  });
  db.close();
}
async function loadStateFromIdb(){
  const db=await openHanemyDb();
  const result=await new Promise((resolve,reject)=>{
    const tx=db.transaction(DB_STORE,'readonly');
    const req=tx.objectStore(DB_STORE).get(DB_STATE_ID);
    req.onsuccess=()=>resolve(req.result?.value||null);
    req.onerror=()=>reject(req.error||new Error('IndexedDB load failed'));
  });
  db.close();
  return result;
}
function normalizeState(raw){
  const s={...blank(),...raw,settings:{...blank().settings,...(raw.settings||{})}};
  s.periods=(raw.periods||[]).map(norm);
  if(!s.active && s.periods.length)s.active=s.periods[s.periods.length-1].id;
  return s;
}
function save(){

function detailHtml(p,t){
  const lifeTotal=num(p.lifePlan?.total);
  const lifeDefaults=[
    ['foodLiving','食べる・暮らす'],
    ['transport','移動'],
    ['otherLife','その他の生活']
  ];
  const funTotal=num(p.funPlan?.hobby)+num(p.funPlan?.social)+num(p.funPlan?.otherFun);
  const funItems=[
    ['hobby','趣味',num(p.funPlan?.hobby),num(p.spent.fun?.hobby)],
    ['social','交際・デート',num(p.funPlan?.social),num(p.spent.fun?.social)],
    ['otherFun','その他の楽しみ',num(p.funPlan?.otherFun),num(p.spent.fun?.otherFun)]
  ];
  const wantItems=(p.wantItems||[]).filter(x=>x.name||num(x.amount)>0)
    .map(x=>['want',x.name||'未入力',num(x.amount),num((p.spent.want||{})[x.name]||0)]);

  const lifeSpentTotal=lifeDefaults.reduce((s,[k])=>s+num(p.spent.life?.[k]),0);
  const lifeItems=lifeDefaults.map(([key,label])=>{
    const spent=num(p.spent.life?.[key]);
    const budget=lifeSpentTotal>0 && lifeTotal>0 ? Math.round(lifeTotal*(spent/lifeSpentTotal)) : Math.round(lifeTotal/lifeDefaults.length);
    return [key,label,budget,spent];
  });

  const allSections=[
    ['生活費',lifeItems,lifeTotal,lifeSpentTotal],
    ['楽しみ用',funItems,funTotal,funItems.reduce((s,x)=>s+x[3],0)],
    ['今月やりたいこと',wantItems,wantItems.reduce((s,x)=>s+x[2],0),wantItems.reduce((s,x)=>s+x[3],0)]
  ];

  const row=(label,budget,spent)=>{
    const pct=budget>0?Math.round((spent/budget)*100):(spent>0?100:0);
    const over=pct>100;
    const safePct=Math.max(0,Math.min(100,pct));
    return `<div class="categoryUsageRow ${over?'over':''}">
      <div class="categoryUsageTop">
        <strong>${esc(label)}</strong>
        <span class="usagePercent ${over?'negative':''}">${pct}%</span>
      </div>
      <div class="usageBar"><span style="width:${safePct}%"></span></div>
      <div class="categoryUsageMeta">
        <span>使った額 ${money(spent)}</span>
        <span>目安額 ${budget>0?money(budget):'未設定'}</span>
      </div>
    </div>`;
  };

  return `<div class="categoryUsageList">
    ${allSections.map(([title,items,budget,spent])=>`
      <section class="categoryUsageSection">
        <div class="categoryUsageSectionHead">
          <h3>${esc(title)}</h3>
          <span class="muted small">${budget>0?`${money(spent)} / ${money(budget)}`:money(spent)}</span>
        </div>
        ${items.length?items.map(x=>row(x[1],x[2],x[3])).join(''):'<p class="muted small">まだ項目がありません。</p>'}
      </section>
    `).join('')}
    ${detailNumbers?`<div class="quietDetails">
      <div class="row line"><span class="muted">今月の残り</span><strong>${money(remainingUsable(t))}</strong></div>
      <div class="row line"><span class="muted">生活費の残り</span><strong>あと ${money(t.lr)}</strong></div>
      <div class="row line"><span class="muted">楽しみ用の残り</span><strong>あと ${money(t.fr)}</strong></div>
      <div class="row line"><span class="muted">残りそうな見込み</span><strong>${money(t.adjusted)}</strong></div>
      <div class="row line"><span class="muted">絶対支払い</span><strong>${money(t.fix)}</strong></div>
    </div>`:''}
  </div>`;
}
function cat(title,avail,spent,remain,items,obj){const rate=avail?Math.round(spent/avail*100):0;return`<div class="line"><div class="row"><h3>${title}</h3><span class="small muted">使用率 ${rate}%</span></div><div class="usage"><div class="fill" style="width:${Math.max(0,Math.min(100,rate))}%"></div></div><div class="row"><span class="muted">使った額</span><strong>${money(spent)} / 使える ${money(avail)}</strong></div><div class="row"><span class="muted">あと</span><strong class="${remain<0?'negative':''}">${money(remain)}</strong></div>${items.map(([k,l])=>`<div class="row"><span class="muted">${l}</span><strong>${money(obj[k])}</strong></div>`).join('')}</div>`;}

function drawShareRow(ctx,label,value,x,y){
  const W=1080;
  ctx.fillStyle='#fff6e8';
  drawRound(ctx,x,y,W-220,82,24,true,false);
  ctx.fillStyle='#7b6859';
  ctx.font=font(26,800);
  ctx.fillText(label,x+32,y+50);
  ctx.fillStyle='#2f2118';
  ctx.font=font(32,900);
  ctx.textAlign='right';
  ctx.fillText(value,W-140,y+52);
  ctx.textAlign='left';
  return y+82;
}

function drawRound(ctx,x,y,w,h,r,fill=true,stroke=false){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
  if(fill)ctx.fill();
  if(stroke)ctx.stroke();
}

function font(size,weight=700){
  return `${weight} ${size}px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif`;
}

function wrapCanvasText(ctx,text,x,y,maxWidth,lineHeight){
  const chars=String(text).split('');
  let line='', yy=y;
  for(const ch of chars){
    const test=line+ch;
    if(ctx.measureText(test).width>maxWidth && line){
      ctx.fillText(line,x,yy);
      line=ch;
      yy+=lineHeight;
    }else{
      line=test;
    }
  }
  if(line)ctx.fillText(line,x,yy);
  return yy+lineHeight;
}

async function resetAppCacheAndReload(){
  const ok = confirm('アプリの一時保存を整理して、最新版を読み込み直します。入力したお金のデータは消しません。実行しますか？');
  if(!ok) return;
  try{
    if('serviceWorker' in navigator){
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map((reg)=>reg.unregister()));
    }
  }catch(error){}
  try{
    if(window.caches){
      const keys = await caches.keys();
      await Promise.all(keys.filter((key)=>String(key).includes('hanemy')).map((key)=>caches.delete(key)));
    }
  }catch(error){}
  const base = location.origin + location.pathname;
  location.replace(base + '?refresh=' + Date.now());
}

function undoLastEntry(){
  if(undoToastTimer){
    clearTimeout(undoToastTimer);
    undoToastTimer=null;
  }
  if(!lastUndo)return;
  const p=active(); if(!p)return;
  reverseHistoryEntry(p,lastUndo);
  p.quickHistory=(p.quickHistory||[]).filter(x=>x.id!==lastUndo.id);
  save();
  lastUndo=null;
  const host=document.getElementById('undoHost');
  if(host){
    host.hidden=true;
    host.innerHTML='';

  render();

function reverseHistoryEntry(p,h){
  const reverse=-(Number(h.amount)||0);
  if(h.type==='life')p.spent.life[h.key]=Math.max(0,num(p.spent.life[h.key])+reverse);
  if(h.type==='fun')p.spent.fun[h.key]=Math.max(0,num(p.spent.fun[h.key])+reverse);
  if(h.type==='want')p.spent.want[h.key]=Math.max(0,num(p.spent.want[h.key])+reverse);
}

          <div class="quickEmptyItem"><span class="quickEmptyNum">3</span><span>そのあとここから、使った額金額を反映する</span></div>
        </div>
        <div class="actions quickEmptyActions">
          <button class="primary" id="quickGoSetup">今月の準備を始める</button>
        </div>
      </section>
    </div>${appFooter()}`;
    document.getElementById('quickGoSetup').onclick=()=>{setupMode='landing';setView('setup');};
    return;
  }

  if(!quickSelected){
    quickSelected=defaultQuickSelectionFor(quickGroup,p);
  }
  const wants=(p.wantItems||[]).filter(x=>x.name||num(x.amount)>0);
  const groupItems = quickGroup==='life'
    ? life.map(([key,label])=>({type:'life',key,label}))
    : quickGroup==='fun'
      ? fun.map(([key,label])=>({type:'fun',key,label}))
      : wants.map((x,i)=>({type:'want',key:x.name||'未入力',label:x.name||'未入力'}));

  root.innerHTML=`<div class="quickShell quickOneScreen">
    <section class="hanemyBoard quickInputBoard">
      <div class="quickBoardHead">
        <div>
          <p class="eyebrow">ざっくり入力</p>
          <h1>何に使いましたか？</h1>
          <p class="muted small">細かく記録せず、使った額分だけ反映します。</p>
        </div>
      </div>

      <div class="quickTabs" aria-label="入力先の種類">
        <button class="quickTab ${quickGroup==='life'?'active':''}" data-qgroup="life">生活</button>
        <button class="quickTab ${quickGroup==='fun'?'active':''}" data-qgroup="fun">楽しみ</button>
        <button class="quickTab ${quickGroup==='want'?'active':''}" data-qgroup="want">やりたい</button>
      </div>

      <div class="quickBoardSection">
        <div class="quickSectionLabel">入力先</div>
        <div class="quickChips">
          ${groupItems.length?groupItems.map(x=>`<button class="quickChip ${quickSelected&&quickSelected.type===x.type&&quickSelected.key===x.key?'active':''}" data-qtype="${x.type}" data-qkey="${esc(x.key)}" data-qlabel="${esc(x.label)}">${esc(x.label)}</button>`).join(''):'<span class="muted small">やりたいことは、今月の準備で追加できます。</span>'}
        </div>
      </div>

      <div class="hanemyBoardMain quickAmountBoard">
        <div>
          <span class="quickSectionLabel">入力予定額</span>
          <strong class="quickPendingAmount ${quickSign===-1&&quickPending>0?'negative':''}">${quickSign===-1&&quickPending>0?'-':''}${money(quickPending)}</strong>
          <p class="muted small">${quickSelected?esc(quickSelected.label)+' に反映します':'入力先を選んでください'}</p>
        </div>
        <div class="signToggle compactSignToggle" aria-label="入力の種類">
          <button class="signBtn ${quickSign===1?'active':''}" data-sign="1">＋使った額</button>
          <button class="signBtn ${quickSign===-1?'active':''}" data-sign="-1">−取り消し</button>
        </div>
      </div>

      <div class="amounts quickAmountButtons">
        ${[500,1000,3000].map(v=>`<button class="primary quickAmountBtn" data-add-pending="${v}">+${yen.format(v)}円</button>`).join('')}
        <button class="clearBtn quickClearBtn" id="clearPending">クリア</button>
      </div>

      <button class="primary confirmQuickBtn boardConfirmBtn" id="confirmQuick" ${quickSelected&&quickPending>0?'':'disabled'}>${quickSelected&&quickPending>0?'ざっくり入力する':'金額を選んでください'}</button>

      <div class="quickHistoryCompact">
        <div class="row"><strong>直近の履歴</strong><span class="muted small">確認用</span></div>
        ${renderQuickHistoryCompact(p)}
      </div>
    </section>${appFooter()}</div>`;

  document.querySelectorAll('[data-qgroup]').forEach(btn=>btn.onclick=()=>{
    quickGroup=btn.dataset.qgroup;
    quickSelected=defaultQuickSelectionFor(quickGroup,p);
    quickPending=0;
    quickSign=1;
    renderQuickPage();
  });

  document.querySelectorAll('.quickChip').forEach(btn=>btn.onclick=()=>{
    quickSelected={type:btn.dataset.qtype,key:btn.dataset.qkey,label:btn.dataset.qlabel};
    quickPending=0;
    quickSign=1;
    renderQuickPage();
  });

  document.querySelectorAll('[data-sign]').forEach(btn=>btn.onclick=()=>{
    quickSign=Number(btn.dataset.sign);
    renderQuickPage();
  });

  document.querySelectorAll('[data-add-pending]').forEach(btn=>btn.onclick=()=>{
    quickPending += num(btn.dataset.addPending);
    renderQuickPage();
  });

  document.getElementById('clearPending')?.addEventListener('click',()=>{
    quickPending=0;
    renderQuickPage();
  });

  document.getElementById('confirmQuick')?.addEventListener('click',()=>{
    if(quickSelected && quickPending>0){
      applyQuickEntry(quickSelected, quickPending * quickSign);
      quickPending=0;
      quickSign=1;
      quickSelected=defaultQuickSelectionFor(quickGroup,p);
    }
  });

  bindHistoryDelete();
}



function renderQuickHistoryCompact(p){
  const items=(p.quickHistory||[]).slice().reverse().slice(0,2);
  if(!items.length)return '<p class="muted small" style="margin-top:8px">まだ入力はありません。</p>';
  return `<div class="historyList compactHistoryList">${items.map(h=>`<div class="historyItem compactHistoryItem"><div><strong>${esc(h.label)}</strong><div class="muted small">${money(Number(h.amount)||0)}</div></div><button class="tinyDanger" data-delete-history="${esc(h.id)}">削除</button></div>`).join('')}</div>`;
}

function renderQuickHistory(p){
  const items=(p.quickHistory||[]).slice().reverse().slice(0,5);
  if(!items.length)return '<p class="muted" style="margin-top:12px">まだ入力はありません。</p>';
  return `<div class="historyList">${items.map(h=>`<div class="historyItem"><div><strong>${esc(h.label)}</strong><div class="muted small">${money(Number(h.amount)||0)}</div></div><button class="tinyDanger" data-delete-history="${esc(h.id)}">削除</button></div>`).join('')}</div>`;
}

function applyQuickEntry(target,amount){
  const p=active(); if(!p||!amount)return;
  const delta=Number(amount)||0;
  if(target.type==='life')p.spent.life[target.key]=Math.max(0,num(p.spent.life[target.key])+delta);
  if(target.type==='fun')p.spent.fun[target.key]=Math.max(0,num(p.spent.fun[target.key])+delta);
  if(target.type==='want')p.spent.want[target.key]=Math.max(0,num(p.spent.want[target.key])+delta);
  p.quickHistory=p.quickHistory||[];
  const entry={id:'h_'+Date.now()+'_'+Math.random().toString(16).slice(2),type:target.type,key:target.key,label:target.label,amount:delta,createdAt:new Date().toISOString()};
  p.quickHistory.push(entry);
  lastUndo=entry;
  save();
  renderQuickPage();
  renderUndoToast();
}

function bindHistoryDelete(){
  document.querySelectorAll('[data-delete-history]').forEach(btn=>btn.onclick=()=>{
    const p=active(); if(!p)return;
    const id=btn.dataset.deleteHistory;
    const h=(p.quickHistory||[]).find(x=>x.id===id);
    if(!h)return;
    reverseHistoryEntry(p,h);
    p.quickHistory=(p.quickHistory||[]).filter(x=>x.id!==id);
    if(lastUndo&&lastUndo.id===id)lastUndo=null;
    save();
    renderQuickPage();
    renderUndoToast();
  });
}


async function restoreStateFromPersistentStore(){
  if(state && state.periods && state.periods.length)return;
  try{
    const raw=await loadStateFromIdb();
    if(raw && raw.periods && raw.periods.length){
      state=normalizeState(raw);
      try{localStorage.setItem(KEY,JSON.stringify(state));}catch(error){}
      render();
      updateNoticeDot();
    }
  }catch(error){
    console.warn('Hanemy persistent restore skipped', error);
  }
}

function render(){if(view==='setup')renderSetup();else if(view==='quick')renderQuickPage();else if(view==='review')renderReview();else renderHome();}
window.addEventListener('pagehide', persistAll);
window.addEventListener('beforeunload', persistAll);
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden')persistAll();});
restoreDraft();
render();updateNoticeDot();restoreStateFromPersistentStore();
})();
</script>
